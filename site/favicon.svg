<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Head -->
  <circle cx="32" cy="36" r="22" fill="#EED3BE"/>
  <!-- Ears -->
  <polygon points="10,20 16,4 24,18" fill="#EED3BE"/>
  <polygon points="40,18 48,4 54,20" fill="#EED3BE"/>
  <!-- Inner ears -->
  <polygon points="12,19 16,8 22,18" fill="#D48C70"/>
  <polygon points="42,18 48,8 52,19" fill="#D48C70"/>
  <!-- Eyes -->
  <ellipse cx="24" cy="32" rx="4" ry="5" fill="#4A2E20"/>
  <ellipse cx="40" cy="32" rx="4" ry="5" fill="#4A2E20"/>
  <!-- Eye shine -->
  <circle cx="25.5" cy="30" r="1.3" fill="white"/>
  <circle cx="41.5" cy="30" r="1.3" fill="white"/>
  <!-- Nose -->
  <ellipse cx="32" cy="40" rx="2.5" ry="1.8" fill="#D48C70"/>
  <!-- Mouth -->
  <path d="M29.5 42 Q32 45 34.5 42" stroke="#4A2E20" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Whiskers left -->
  <line x1="12" y1="39" x2="28" y2="41" stroke="#ADACA9" stroke-width="1" stroke-linecap="round"/>
  <line x1="12" y1="43" x2="28" y2="43" stroke="#ADACA9" stroke-width="1" stroke-linecap="round"/>
  <!-- Whiskers right -->
  <line x1="36" y1="41" x2="52" y2="39" stroke="#ADACA9" stroke-width="1" stroke-linecap="round"/>
  <line x1="36" y1="43" x2="52" y2="43" stroke="#ADACA9" stroke-width="1" stroke-linecap="round"/>
</svg>
